<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Математическая викторина</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="quiz-screen" class="screen active">
    <div class="card">
      <div class="progress-header">
        <span id="question-counter">Вопрос 1 из 10</span>
        <span id="score-label">Счёт: 0</span>
      </div>
      <div class="progress-bar-wrap">
        <div id="progress-bar"></div>
      </div>
      <h2 id="question-text"></h2>
      <div id="answers-container"></div>
      <button id="next-btn" class="btn btn-primary" style="display:none;">Следующий вопрос</button>
    </div>
  </div>

  <div id="result-screen" class="screen active">
    <div class="card">
      <h1 id="result-title"></h1>
      <p id="result-text" class="subtitle"></p>
      <div id="result-score" class="result-score"></div>
      <button id="restart-btn" class="btn btn-primary">Начать заново</button>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
